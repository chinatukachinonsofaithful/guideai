<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/guideai.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuideAI</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Theme: run before React to prevent flash -->
    <script>
      (function () {
        const saved = localStorage.getItem("guideai_theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (
          saved === "dark" ||
          ((!saved || saved === "system") && prefersDark)
        ) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
